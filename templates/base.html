<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SOAR{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            color: #2c3e50;
        }

        /* NAVBAR */
        .navbar {
            background-color: #2c3e50;
            padding: 0 2rem;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left a {
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .dropdown {
            position: relative;
        }

        .dropdown > a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            min-width: 220px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 1000;
        }

        .dropdown-content a {
            display: block;
            padding: 12px 16px;
            text-decoration: none;
            color: #2c3e50;
        }

        .dropdown-content a:hover {
            background-color: #f3f5f8;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .external-link {
            color: white;
            text-decoration: none;
        }

        .external-link:hover {
            opacity: 0.8;
        }

        main {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #7f8c8d;
            background-color: #ecf0f1;
            margin-top: 4rem;
        }
    </style>
</head>

<body>

<nav class="navbar">

    <div class="nav-left">
        <a href="/">SOAR</a>
    </div>

    <div class="nav-right">

        <div class="dropdown">
            <a href="#">Opportunities</a>
            <div class="dropdown-content">
                <a href="/opportunities/landing">Find Opportunities</a>
                <a href="/opportunities/research">Research</a>
                <a href="/opportunities/jobs">Jobs</a>
                <a href="/opportunities/internships">Internships</a>
                <a href="/opportunities/off-campus">Off Campus Study</a>
            </div>
        </div>

        <div class="dropdown">
            <a href="#">Resources & Exploration</a>
            <div class="dropdown-content">
                <a href="#">Placeholder 1</a>
                <a href="#">Placeholder 2</a>
            </div>
        </div>

        <div class="dropdown">
            <a href="#">Internship Archive</a>
            <div class="dropdown-content">
                <a href="/internships/landing">Internship Archive</a>
                <a href="/internships/map">Map</a>
                <a href="/internships/list">Archive List</a>
            </div>
        </div>

        <a class="external-link"
           href="https://www.coa.edu/academics/internships/"
           target="_blank">
            Career Development
        </a>

    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 SOAR Database | Frances LeDuke
</footer>

</body>
</html>
