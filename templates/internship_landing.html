<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internship Archive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            margin-top: 0.5rem;
            font-size: 1.2rem;
        }
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2rem auto;
            max-width: 1000px;
        }
        .archive-card {
            position: relative;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin: 1rem;
            flex: 1 1 300px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: white;
            height: 200px;
        }
        .archive-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(70%);
            transition: transform 0.3s;
        }
        .archive-card:hover img {
            transform: scale(1.05);
        }
        .archive-card h2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 1.5rem;
            z-index: 2;
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Internship Archive</h1>
        <p>Explore past internships, program locations, and resources for planning your next steps.</p>
    </header>

    <main>
        <a href="/internships/map" class="archive-card">
            <img src="{{ url_for('static', filename='map_tile.png') }}" alt="Archive Map">
            <h2>Archive Map</h2>
        </a>
        <a href="/internships/list" class="archive-card">
            <img src="{{ url_for('static', filename='list_tile.png') }}" alt="Archive List">
            <h2>Archive List</h2>
        </a>
    </main>
</body>
</html>
