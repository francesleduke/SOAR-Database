<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opportunities</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            margin-top: 0.5rem;
            font-size: 1.2rem;
        }
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2rem auto;
            max-width: 1000px;
        }
        .category-card {
            position: relative;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin: 1rem;
            flex: 1 1 250px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: white;
            height: 200px;
        }
        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(70%);
            transition: transform 0.3s;
        }
        .category-card:hover img {
            transform: scale(1.05);
        }
        .category-card h2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 1.5rem;
            z-index: 2;
        }
        .category-card p {
            display: none; /* optional: show on hover */
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Opportunities</h1>
        <p>Discover jobs, research positions, and off-campus study programs curated for students.</p>
    </header>

    <main>
        <a href="/opportunities/job" class="category-card">
            <img src="{{ url_for('static', filename='jobs.jpg') }}" alt="Jobs">
            <h2>Jobs</h2>
        </a>
        <a href="/opportunities/research" class="category-card">
            <img src="{{ url_for('static', filename='research.jpg') }}" alt="Research">
            <h2>Research</h2>
        </a>
        <a href="/opportunities/off-campus" class="category-card">
            <img src="{{ url_for('static', filename='offcampus.jpg') }}" alt="Off-Campus Study">
            <h2>Off-Campus Study</h2>
        </a>
    </main>
</body>
</html>
